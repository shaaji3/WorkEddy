server {
    listen 80;
    server_name workeddy.com www.workeddy.com;
    client_max_body_size 210M;

    root /var/www/html/public;
    index index.php;

    # --- ACME (must be first and use alias) ---
    location ^~ /.well-known/acme-challenge/ {
        alias /var/www/html/public/.well-known/acme-challenge/;
        default_type text/plain;
        try_files $uri =404;
    }

    # --- static ---
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        try_files $uri =404;
    }

    # --- main ---
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # --- php ---
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass api:9000;

        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;

        # IMPORTANT for Traefik / reverse proxy
        fastcgi_param HTTP_HOST $host;
        fastcgi_param HTTP_X_FORWARDED_HOST $host;
        fastcgi_param HTTP_X_FORWARDED_PROTO $scheme;
        fastcgi_param HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;
        fastcgi_param HTTPS off;
    }
    # Serve uploaded videos from shared storage
    location /storage/videos/ {
        alias /storage/uploads/videos/;
        add_header Accept-Ranges bytes;
        add_header Cache-Control "private, max-age=3600";
    }

    # Serve generated pose-overlay videos from shared storage
    location /storage/pose/ {
        alias /storage/uploads/pose/;
        add_header Accept-Ranges bytes;
        add_header Cache-Control "private, max-age=3600";
    }

}