services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./infrastructure/docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/var/www/html/public:ro
      - storage_data:/storage:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      - api

  api:
    image: workeddy-app
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /var/www/html
    command: ["php-fpm", "-F"]
    volumes:
      - .:/var/www/html                       # live-reload project code
      - vendor_data:/var/www/html/vendor      # preserve image-built vendor (not overwritten by host mount)
      - storage_data:/storage                 # shared upload storage with worker
    env_file:
      - .env
      - ./infrastructure/docker/compose.env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  schema-sync:
    image: workeddy-app
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - vendor_data:/var/www/html/vendor
      - storage_data:/storage
    env_file:
      - .env
      - ./infrastructure/docker/compose.env
    command: ["sh", "/var/www/html/infrastructure/docker/schema-sync.sh"]
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    restart: no

  seed:
    image: workeddy-app
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - vendor_data:/var/www/html/vendor
      - storage_data:/storage
    env_file:
      - .env
      - ./infrastructure/docker/compose.env
    command: ["php", "scripts/seed.php", "run"]
    depends_on:
      mysql:
        condition: service_healthy
      api:
        condition: service_started
    profiles:
      - ops
    restart: no

  video-worker:
    build:
      context: .
      dockerfile: infrastructure/docker/video-worker.dockerfile
    volumes:
      - ./workers:/app/workers
      - ./shared:/app/shared:ro
      - ./ml:/app/ml
      - storage_data:/storage                 # same volume as api service
    env_file:
      - .env
      - ./infrastructure/docker/compose.env
    healthcheck:
      test: ["CMD", "python", "/app/workers/shared/container_healthcheck.py", "video-worker"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      nginx:
        condition: service_healthy
    restart: unless-stopped

