  video-retention:
    image: workeddy-app
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - vendor_data:/var/www/html/vendor
      - storage_data:/storage
    env_file:
      - .env
      - ./infrastructure/docker/compose.env
    command: ["sh", "-lc", "while true; do php scripts/cleanup-videos.php; sleep $${VIDEO_CLEANUP_INTERVAL_SECONDS:-86400}; done"]
    depends_on:
      mysql:
        condition: service_healthy
      api:
        condition: service_started
    restart: no

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${DB_NAME:-workeddy}
      MYSQL_USER: ${DB_USER:-workeddy}
      MYSQL_PASSWORD: ${DB_PASS:-workeddy}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS:-rootsecret}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  redis:
    image: redis:7-alpine
    command: ["redis-server", "/etc/redis/redis.conf"]
    ports:
      - "6380:6379"
    volumes:
      - ./infrastructure/queue/redis.conf:/etc/redis/redis.conf:ro
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

volumes:
  mysql_data:
  redis_data:
  vendor_data:    # PHP Composer dependencies (built inside image, not overridden by host)
  storage_data:   # Shared upload/processed file storage (api writes, worker reads)
