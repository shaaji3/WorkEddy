services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./infrastructure/docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/var/www/html/public:ro
      - storage_data:/storage:ro
    depends_on:
      - api

  # ── One-shot: run migrations then seed (exits when done) ──────────────────
  migrate:
    build:
      context: .
      dockerfile: infrastructure/docker/php.dockerfile
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - vendor_data:/var/www/html/vendor
      - storage_data:/storage
    env_file: .env
    environment:
      APP_ENV: local
      DB_HOST: mysql
      DB_PORT: 3306
    command:
      - sh
      - -c
      - "mkdir -p /storage/uploads/videos /storage/uploads/frames /storage/uploads/processed /storage/uploads/reports /storage/temp /storage/logs /storage/exports && chmod -R 777 /storage && php scripts/migrate.php migrate && php scripts/seed.php run"
    depends_on:
      mysql:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      dockerfile: infrastructure/docker/php.dockerfile
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html                       # live-reload project code
      - vendor_data:/var/www/html/vendor      # preserve image-built vendor (not overwritten by host mount)
      - storage_data:/storage                 # shared upload storage with worker
    env_file: .env
    environment:
      APP_ENV: local
      DB_HOST: mysql
      DB_PORT: 3306
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      migrate:
        condition: service_completed_successfully

  worker:
    build:
      context: .
      dockerfile: infrastructure/docker/worker.dockerfile
    volumes:
      - ./workers:/app/workers
      - ./ml:/app/ml
      - storage_data:/storage                 # same volume as api service
    env_file: .env
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${DB_NAME:-workeddy}
      MYSQL_USER: ${DB_USER:-workeddy}
      MYSQL_PASSWORD: ${DB_PASS:-workeddy}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS:-rootsecret}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "workeddy", "-pworkeddy"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  redis:
    image: redis:7-alpine
    command: ["redis-server", "/etc/redis/redis.conf"]
    ports:
      - "6380:6379"
    volumes:
      - ./infrastructure/queue/redis.conf:/etc/redis/redis.conf:ro

volumes:
  mysql_data:
  vendor_data:    # PHP Composer dependencies (built inside image, not overridden by host)
  storage_data:   # Shared upload/processed file storage (api writes, worker reads)

