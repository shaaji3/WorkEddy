services:
  nginx:
    image: nginx:1.27-alpine
    labels:
      - traefik.enable=true
      - traefik.http.routers.workeddy.rule=Host(`workeddy.com`) || Host(`www.workeddy.com`)
      - traefik.http.routers.workeddy.entrypoints=websecure
      - traefik.http.routers.workeddy.tls.certresolver=letsencrypt
      - traefik.http.services.workeddy.loadbalancer.server.port=80
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q -O /dev/null http://127.0.0.1/ || exit 1
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    volumes:
      - ./infrastructure/docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/var/www/html/public
      - storage_data:/storage:ro
    depends_on:
      - api
  api:
    image: workeddy-app
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /var/www/html
    command:
      - php-fpm
      - -F
    env_file:
      - .env
      - ./infrastructure/docker/compose.env
    restart: unless-stopped
    volumes:
      - .:/var/www/html # live-reload project code
      - vendor_data:/var/www/html/vendor # preserve image-built vendor (not overwritten by host mount)
      - storage_data:/storage # same volume as api service
    depends_on:
      - mysql
      - redis
  schema-sync:
    image: workeddy-app
    working_dir: /var/www/html
    env_file:
      - .env
      - ./infrastructure/docker/compose.env
    command:
      - sh
      - /var/www/html/infrastructure/docker/schema-sync.sh
    restart: no
    volumes:
      - .:/var/www/html # live-reload project code
      - vendor_data:/var/www/html/vendor # preserve image-built vendor (not overwritten by host mount)
      - storage_data:/storage # same volume as api service
    depends_on:
      - mysql
      - redis
  seed:
    image: workeddy-app
    working_dir: /var/www/html
    env_file:
      - .env
      - ./infrastructure/docker/compose.env
    command:
      - php
      - scripts/seed.php
      - run
    profiles:
      - ops
    restart: no
    volumes:
      - .:/var/www/html # live-reload project code
      - vendor_data:/var/www/html/vendor # preserve image-built vendor (not overwritten by host mount)
      - storage_data:/storage # same volume as api service
    depends_on:
      - mysql
      - api
  video-worker:
    build:
      context: .
      dockerfile: infrastructure/docker/video-worker.dockerfile
    env_file:
      - .env
      - ./infrastructure/docker/compose.env
    healthcheck:
      test:
        - CMD
        - python
        - /app/workers/shared/container_healthcheck.py
        - video-worker
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    volumes:
      - ./workers:/app/workers
      - ./shared:/app/shared:ro
      - ./ml:/app/ml
      - storage_data:/storage # same volume as api service
    depends_on:
      - nginx
  video-retention:
    image: workeddy-app
    working_dir: /var/www/html
    env_file:
      - .env
      - ./infrastructure/docker/compose.env
    command:
      - sh
      - -lc
      - while true; do php scripts/cleanup-videos.php; sleep $${VIDEO_CLEANUP_INTERVAL_SECONDS:-86400}; done
    restart: no
    volumes:
      - .:/var/www/html # live-reload project code
      - vendor_data:/var/www/html/vendor # preserve image-built vendor (not overwritten by host mount)
      - storage_data:/storage # same volume as api service
    depends_on:
      - mysql
      - api
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${DB_NAME:-workeddy}
      MYSQL_USER: ${DB_USER:-workeddy}
      MYSQL_PASSWORD: ${DB_PASS:-workeddy}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS:-rootsecret}
    healthcheck:
      test:
        - CMD-SHELL
        - mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD}
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    ports:
      - 3307:3306
    volumes:
      - mysql_data:/var/lib/mysql
  redis:
    image: redis:7-alpine
    command:
      - redis-server
      - /etc/redis/redis.conf
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    ports:
      - 6380:6379
    volumes:
      - ./infrastructure/queue/redis.conf:/etc/redis/redis.conf:ro
      - redis_data:/data
volumes:
  mysql_data:
  redis_data:
  vendor_data: # PHP Composer dependencies (built inside image, not overridden by host)
  storage_data: # Shared upload/processed file storage (api writes, worker reads)