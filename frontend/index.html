<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WorkEddy Console</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
      <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  </head>
  <body class="bg-light">
    <main class="container py-4" x-data="{ready:true}">
      <h1 class="h3 mb-3">WorkEddy Milestone 2 Console</h1>

      <div class="card mb-3">
        <div class="card-body">
          <label class="form-label">JWT Token</label>
          <input id="token" class="form-control" placeholder="Paste token from /auth/login or /auth/signup" />
        </div>
      </div>

      <div class="row g-3">
        <div class="col-lg-4">
          <div class="card h-100">
            <div class="card-header">Create Task</div>
            <div class="card-body">
              <input id="taskName" class="form-control mb-2" placeholder="Task name" />
              <input id="taskDepartment" class="form-control mb-2" placeholder="Department" />
              <textarea id="taskDescription" class="form-control mb-2" placeholder="Description"></textarea>
              <button class="btn btn-primary w-100" onclick="createTask()">Create Task</button>
            </div>
          </div>
        </div>

        <div class="col-lg-4">
          <div class="card h-100">
            <div class="card-header">Manual Scan</div>
            <div class="card-body">
              <input id="scanTaskId" type="number" class="form-control mb-2" placeholder="Task ID" />
              <input id="weight" type="number" class="form-control mb-2" placeholder="Weight lifted" value="10" />
              <input id="frequency" type="number" class="form-control mb-2" placeholder="Lift frequency" value="8" />
              <input id="duration" type="number" class="form-control mb-2" placeholder="Task duration" value="20" />
              <input id="trunk" type="number" class="form-control mb-2" placeholder="Trunk angle estimate" value="25" />
              <input id="repetition" type="number" class="form-control mb-2" placeholder="Repetition rate" value="12" />
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="twisting" />
                <label class="form-check-label" for="twisting">Twisting</label>
              </div>
              <div class="form-check mb-2">
                <input class="form-check-input" type="checkbox" id="overhead" />
                <label class="form-check-label" for="overhead">Overhead work</label>
              </div>
              <button class="btn btn-warning w-100" onclick="createManualScan()">Submit Manual Scan</button>
            </div>
          </div>
        </div>

        <div class="col-lg-4">
          <div class="card h-100">
            <div class="card-header">Dashboard</div>
            <div class="card-body">
              <button class="btn btn-success w-100 mb-2" onclick="loadDashboard()">Load Dashboard</button>
              <button class="btn btn-outline-secondary w-100" onclick="listTasks()">List Tasks</button>
            </div>
          </div>
        </div>
      </div>

      <div class="card mt-3">
        <div class="card-header">Output</div>
        <div class="card-body">
          <pre id="output" class="mb-0" style="max-height: 420px; overflow: auto"></pre>
        </div>
      </div>
    </main>

    <script>
      const API_BASE = 'http://localhost:8080';

      function authHeaders() {
        const token = document.getElementById('token').value.trim();
        return {
          'Content-Type': 'application/json',
          Authorization: `Bearer ${token}`,
        };
      }

      function setOutput(data) {
        document.getElementById('output').textContent = JSON.stringify(data, null, 2);
      }

      async function createTask() {
        const payload = {
          name: document.getElementById('taskName').value,
          department: document.getElementById('taskDepartment').value,
          description: document.getElementById('taskDescription').value,
        };
        const res = await fetch(`${API_BASE}/tasks`, { method: 'POST', headers: authHeaders(), body: JSON.stringify(payload) });
        setOutput(await res.json());
      }

      async function createManualScan() {
        const payload = {
          task_id: Number(document.getElementById('scanTaskId').value),
          weight: Number(document.getElementById('weight').value),
          frequency: Number(document.getElementById('frequency').value),
          duration: Number(document.getElementById('duration').value),
          trunk_angle_estimate: Number(document.getElementById('trunk').value),
          twisting: document.getElementById('twisting').checked,
          overhead: document.getElementById('overhead').checked,
          repetition: Number(document.getElementById('repetition').value),
        };

        const res = await fetch(`${API_BASE}/scans/manual`, { method: 'POST', headers: authHeaders(), body: JSON.stringify(payload) });
        setOutput(await res.json());
      }

      async function loadDashboard() {
        const res = await fetch(`${API_BASE}/dashboard`, { headers: authHeaders() });
        setOutput(await res.json());
      }

      async function listTasks() {
        const res = await fetch(`${API_BASE}/tasks`, { headers: authHeaders() });
        setOutput(await res.json());
      }
    </script>
  </body>
</html>
