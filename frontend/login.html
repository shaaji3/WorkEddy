<!doctype html>
<html lang="en"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WorkEddy | Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
<link rel="stylesheet" href="assets/css/app.css" /></head>
<body>
<div class="container login-wrap d-flex align-items-center justify-content-center py-4">
  <div class="row w-100 g-0 surface-card overflow-hidden" style="max-width:960px;">
    <div class="col-12 col-lg-6 hero-gradient p-4 p-lg-5 d-flex flex-column justify-content-center">
      <h1 class="h3">WorkEddy</h1>
      <p class="mb-0 opacity-75">Multi-tenant ergonomic risk detection for safer warehousing operations.</p>
    </div>
    <div class="col-12 col-lg-6 p-4 p-lg-5">
      <h2 class="h5 mb-3">Sign in to your workspace</h2>
      <div class="mb-3"><label class="form-label">Email</label><input class="form-control" type="email" placeholder="you@company.com" /></div>
      <div class="mb-3"><label class="form-label">Password</label><input class="form-control" type="password" /></div>
      <div class="mb-3"><label class="form-label">One-time code (optional)</label><input class="form-control" /></div>
      <button class="btn btn-primary w-100 mb-2">Sign in</button>
      <a href="index.html" class="btn btn-outline-secondary w-100">Continue to demo dashboard</a>
    </div>
  </div>
</div>
</body></html>
