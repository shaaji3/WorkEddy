<!doctype html>
<html lang="en"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WorkEddy | Observer Validation</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
<link rel="stylesheet" href="assets/css/app.css" /></head>
<body>
<nav class="navbar topbar"><div class="container-fluid px-3"><a class="navbar-brand fw-bold" href="index.html"><span class="brand-mark"></span>WorkEddy</a></div></nav>
<div class="container-fluid"><div class="row"><aside class="col-12 col-lg-2 p-3 sidebar"><nav class="nav flex-column gap-1"><a class="nav-link" href="index.html">Dashboard</a><a class="nav-link" href="tasks.html">Tasks</a><a class="nav-link" href="scans.html">Scans</a><a class="nav-link active" href="observer.html">Observer</a><a class="nav-link" href="billing.html">Billing</a><a class="nav-link" href="settings.html">Settings</a></nav></aside>
<main class="col-12 col-lg-10 p-3 p-lg-4"><h1 class="h4 mb-3">Observer Rating Module</h1>
<div class="row g-4"><div class="col-12 col-xl-6"><section class="surface-card p-3 p-md-4"><h2 class="h6 mb-3">Create Observer Rating</h2><div class="row g-3"><div class="col-12 col-md-6"><label class="form-label">Scan ID</label><input class="form-control" /></div><div class="col-12 col-md-6"><label class="form-label">Observer</label><select class="form-select"><option>observer@acme.com</option></select></div><div class="col-12 col-md-6"><label class="form-label">Confidence</label><select class="form-select"><option>High</option><option>Medium</option><option>Low</option></select></div><div class="col-12 col-md-6"><label class="form-label">Alignment score (0-100)</label><input class="form-control" /></div><div class="col-12"><label class="form-label">Notes</label><textarea class="form-control" rows="4"></textarea></div><div class="col-12"><button class="btn btn-success">Submit rating</button></div></div></section></div>
<div class="col-12 col-xl-6"><section class="surface-card p-3 p-md-4 mb-4"><h2 class="h6 mb-3">Alignment Overview</h2><div class="mb-2 d-flex justify-content-between"><span>Strong alignment</span><strong>64%</strong></div><div class="progress mb-3"><div class="progress-bar bg-success" style="width:64%"></div></div><div class="mb-2 d-flex justify-content-between"><span>Moderate alignment</span><strong>28%</strong></div><div class="progress mb-3"><div class="progress-bar bg-warning" style="width:28%"></div></div><div class="mb-2 d-flex justify-content-between"><span>Mismatch</span><strong>8%</strong></div><div class="progress"><div class="progress-bar bg-danger" style="width:8%"></div></div></section>
<section class="surface-card p-3 p-md-4"><h2 class="h6 mb-3">Recent Ratings</h2><div class="table-responsive"><table class="table mb-0"><thead><tr><th>Scan</th><th>Observer</th><th>Score</th><th>Outcome</th></tr></thead><tbody><tr><td>#4979</td><td>R. Lee</td><td>91</td><td><span class="badge text-bg-success">Aligned</span></td></tr><tr><td>#4976</td><td>M. Carter</td><td>74</td><td><span class="badge text-bg-warning">Review</span></td></tr><tr><td>#4971</td><td>R. Lee</td><td>65</td><td><span class="badge text-bg-danger">Mismatch</span></td></tr></tbody></table></div></section></div></div>
</main></div></div>
</body></html>
